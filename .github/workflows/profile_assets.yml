name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # ── Snake ──────────────────────────────────────────────
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: taseencr
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ── Streak Stats ───────────────────────────────────────
      - name: Fetch streak stats
        run: |
          curl -s \
            "https://streak-stats.demolab.com?user=taseencr&theme=tokyonight&hide_border=true&background=0d1117&ring=a78bfa&fire=a78bfa&currStreakLabel=a78bfa&sideLabels=6d6d8a&dates=6d6d8a&border_radius=10" \
            -o dist/streak-stats.svg

      # ── Activity Graph ─────────────────────────────────────
      - name: Fetch activity graph
        run: |
          curl -s \
            "https://github-readme-activity-graph.vercel.app/graph?username=taseencr&theme=tokyo-night&hide_border=true&bg_color=0d1117&color=a78bfa&line=a78bfa&point=ffffff&area=true&area_color=1a0533" \
            -o dist/activity-graph.svg

      # ── Single Deploy ──────────────────────────────────────
      - name: Deploy all assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
